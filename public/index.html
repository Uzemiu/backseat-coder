<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/styles.css">
  <title>Backseat Coder</title>
</head>
<body>
  <div class="shell">

    <header class="top-bar">
      <input id="repoPath" class="repo-input" placeholder="仓库路径…" autocomplete="off" spellcheck="false">
      <button id="scanBtn" class="btn-primary">扫描</button>
    </header>

    <section id="taskBar" class="task-bar" hidden>
      <textarea id="taskInput" rows="2" placeholder="当前任务，例如：修改登录超时时间…"></textarea>
      <button id="navigateBtn" class="btn-secondary">导航</button>
    </section>

    <main id="cardFeed" class="card-feed" aria-live="polite" aria-label="反馈流"></main>

    <footer class="status-bar">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">就绪</span>
    </footer>

  </div>
  <script src="/app.js"></script>
</body>
</html>
